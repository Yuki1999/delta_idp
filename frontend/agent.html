<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delta IDP - 智能助手 Agent</title>
<link rel="stylesheet" href="/css/style.css">
<style>
/* Agent-specific overrides for Pi/Pi Mono aesthetic */
body { background: #fafafa; }

.agent-page-header {
  background: white;
  border-bottom: 1px solid var(--gray-200);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.agent-page-header .logo-area {
  display: flex;
  align-items: center;
  gap: 10px;
}

.agent-page-header .logo-text {
  font-size: 18px;
  font-weight: 700;
  color: var(--gray-900);
}

.agent-page-header .nav-links {
  display: flex;
  gap: 4px;
}

.agent-page-header .nav-links a {
  padding: 6px 16px;
  border-radius: var(--radius);
  text-decoration: none;
  color: var(--gray-600);
  font-size: 14px;
  font-weight: 500;
  transition: all .15s;
}

.agent-page-header .nav-links a:hover {
  background: var(--gray-100);
  color: var(--gray-900);
}

.agent-page-header .nav-links a.active {
  background: var(--primary-light);
  color: var(--primary);
}

/* Main agent layout */
.agent-layout {
  display: grid;
  grid-template-columns: 280px 1fr;
  height: calc(100vh - 56px);
}

/* Sidebar */
.agent-sidebar {
  background: white;
  border-right: 1px solid var(--gray-200);
  padding: 20px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.agent-sidebar .section-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--gray-400);
  margin-bottom: 8px;
}

.file-chip {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: var(--gray-50);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  font-size: 13px;
  cursor: pointer;
  transition: all .15s;
}

.file-chip:hover {
  border-color: var(--primary);
  background: var(--primary-light);
}

.file-chip.active {
  border-color: var(--primary);
  background: var(--primary-light);
  box-shadow: 0 0 0 2px rgba(37,99,235,.15);
}

.file-chip .chip-icon {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.file-chip .chip-icon.invoice { background: var(--primary); }
.file-chip .chip-icon.packing { background: var(--success); }

.upload-sm-btn {
  width: 100%;
  padding: 10px;
  border: 2px dashed var(--gray-300);
  border-radius: var(--radius);
  background: none;
  cursor: pointer;
  font-size: 13px;
  color: var(--gray-500);
  transition: all .15s;
}

.upload-sm-btn:hover {
  border-color: var(--primary);
  color: var(--primary);
  background: var(--primary-light);
}

.agent-info-card {
  background: linear-gradient(135deg, var(--primary-light), #ede9fe);
  border-radius: var(--radius-lg);
  padding: 16px;
}

.agent-info-card h3 {
  font-size: 14px;
  font-weight: 700;
  color: var(--gray-800);
  margin-bottom: 6px;
}

.agent-info-card p {
  font-size: 12px;
  color: var(--gray-600);
  line-height: 1.6;
}

/* Chat area */
.agent-chat-container {
  display: flex;
  flex-direction: column;
  height: 100%;
}

.agent-chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* Message styling */
.chat-msg {
  display: flex;
  gap: 14px;
  max-width: 80%;
  animation: msgIn .35s cubic-bezier(.4,0,.2,1);
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.chat-msg.user {
  align-self: flex-end;
  flex-direction: row-reverse;
}

.chat-msg .msg-avatar {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 16px;
}

.chat-msg.assistant .msg-avatar {
  background: linear-gradient(135deg, #2563eb, #7c3aed);
  color: white;
  box-shadow: 0 2px 8px rgba(37,99,235,.3);
}

.chat-msg.user .msg-avatar {
  background: var(--gray-200);
  color: var(--gray-600);
}

.chat-msg .msg-content {
  background: white;
  padding: 14px 18px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.75;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
  border: 1px solid var(--gray-100);
  color: var(--gray-800);
}

.chat-msg.user .msg-content {
  background: #2563eb;
  color: white;
  border: none;
}

.chat-msg .msg-content p { margin-bottom: 8px; }
.chat-msg .msg-content p:last-child { margin-bottom: 0; }

.chat-msg .msg-content code {
  background: var(--gray-100);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 13px;
}

.chat-msg.user .msg-content code {
  background: rgba(255,255,255,.2);
}

.chat-msg .msg-content pre {
  background: #1e1e2e;
  color: #cdd6f4;
  padding: 16px;
  border-radius: 12px;
  overflow-x: auto;
  font-family: var(--font-mono);
  font-size: 13px;
  margin: 10px 0;
}

.chat-msg .msg-content table {
  width: 100%;
  border-collapse: collapse;
  margin: 10px 0;
  font-size: 13px;
}

.chat-msg .msg-content th {
  background: var(--gray-50);
  padding: 8px 12px;
  text-align: left;
  font-weight: 600;
  border-bottom: 2px solid var(--gray-200);
}

.chat-msg .msg-content td {
  padding: 6px 12px;
  border-bottom: 1px solid var(--gray-100);
}

.chat-msg .msg-time {
  font-size: 10px;
  color: var(--gray-400);
  margin-top: 4px;
}

.chat-msg.user .msg-time { text-align: right; }

/* Typing indicator */
.typing-msg {
  display: flex;
  gap: 6px;
  padding: 14px 18px;
  align-items: center;
}

.typing-msg span {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--gray-400);
  animation: dotPulse 1.4s infinite;
}

.typing-msg span:nth-child(2) { animation-delay: .2s; }
.typing-msg span:nth-child(3) { animation-delay: .4s; }

@keyframes dotPulse {
  0%, 60%, 100% { transform: translateY(0); opacity: .4; }
  30% { transform: translateY(-7px); opacity: 1; }
}

/* Input area */
.agent-input-bar {
  padding: 16px 24px;
  border-top: 1px solid var(--gray-200);
  background: white;
}

.agent-input-bar .input-row {
  display: flex;
  gap: 12px;
  align-items: flex-end;
}

.agent-input-bar textarea {
  flex: 1;
  padding: 14px 18px;
  border: 1.5px solid var(--gray-300);
  border-radius: 16px;
  font-size: 14px;
  font-family: inherit;
  resize: none;
  min-height: 48px;
  max-height: 150px;
  line-height: 1.5;
  transition: border-color .2s;
}

.agent-input-bar textarea:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 4px rgba(37,99,235,.08);
}

.send-btn {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: var(--primary);
  color: white;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .2s;
  flex-shrink: 0;
}

.send-btn:hover {
  background: var(--primary-dark);
  transform: scale(1.06);
  box-shadow: 0 4px 12px rgba(37,99,235,.3);
}

.send-btn:disabled {
  background: var(--gray-300);
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

.send-btn svg { width: 20px; height: 20px; }

/* Quick actions */
.quick-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 10px;
}

.quick-action {
  padding: 8px 16px;
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
  transition: all .15s;
  color: var(--gray-700);
}

.quick-action:hover {
  border-color: var(--primary);
  color: var(--primary);
  background: var(--primary-light);
}

/* Welcome message */
.welcome-msg {
  text-align: center;
  padding: 40px 20px;
}

.welcome-msg .welcome-icon {
  width: 80px;
  height: 80px;
  border-radius: 24px;
  background: linear-gradient(135deg, var(--primary), #7c3aed);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
  color: white;
  font-size: 36px;
}

.welcome-msg h2 {
  font-size: 22px;
  font-weight: 700;
  color: var(--gray-900);
  margin-bottom: 8px;
}

.welcome-msg p {
  font-size: 14px;
  color: var(--gray-500);
  max-width: 500px;
  margin: 0 auto;
  line-height: 1.7;
}
</style>
</head>
<body>

<!-- Header -->
<header class="agent-page-header">
  <div class="logo-area">
    <svg width="32" height="32" viewBox="0 0 32 32">
      <rect width="32" height="32" rx="8" fill="url(#grad)"/>
      <defs><linearGradient id="grad" x1="0" y1="0" x2="32" y2="32"><stop stop-color="#2563eb"/><stop offset="1" stop-color="#7c3aed"/></linearGradient></defs>
      <text x="16" y="22" text-anchor="middle" fill="white" font-size="16" font-weight="700">π</text>
    </svg>
    <span class="logo-text">Delta IDP Agent</span>
  </div>
  <div class="nav-links">
    <a href="/">单据抽取</a>
    <a href="/agent" class="active">智能助手</a>
  </div>
</header>

<div class="agent-layout">
  <!-- Sidebar -->
  <aside class="agent-sidebar">
    <div>
      <div class="section-title">📄 当前单据</div>
      <div id="agentFileList" style="display:flex;flex-direction:column;gap:6px;">
        <div style="font-size:12px;color:var(--gray-400);padding:8px;">暂无上传单据</div>
      </div>
      <input type="file" id="agentFileInput" accept=".xlsx,.xls,.png,.jpg" hidden>
      <button class="upload-sm-btn" onclick="document.getElementById('agentFileInput').click()" style="margin-top:10px;">
        + 上传单据
      </button>
    </div>

    <div class="agent-info-card">
      <h3>💡 我能做什么</h3>
      <p>
        我可以帮你：<br>
        • 提取发票和装箱单的关键信息<br>
        • 回答关于单据内容的问题<br>
        • 解释报关字段的含义<br>
        • 对比不同技术路径的抽取结果
      </p>
    </div>

    <div>
      <div class="section-title">⚙️ 设置</div>
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;margin-top:8px;">
        <input type="checkbox" id="useQwenCheck" checked>
        使用 Qwen3.6-27B
      </label>
    </div>
  </aside>

  <!-- Chat Area -->
  <div class="agent-chat-container">
    <div class="agent-chat-messages" id="chatMessages">
      <div class="welcome-msg">
        <div class="welcome-icon">π</div>
        <h2>你好，我是 Delta IDP 智能助手</h2>
        <p>我可以帮你从国际物流单据中提取关键信息。请先上传一个单据文件，然后告诉我你需要提取什么。</p>
        <div class="quick-actions" style="justify-content:center;margin-top:16px;">
          <button class="quick-action" onclick="sendQuickAction('提取这份发票的所有关键信息')">📋 提取发票信息</button>
          <button class="quick-action" onclick="sendQuickAction('提取这份装箱单的所有关键信息')">📦 提取装箱单信息</button>
          <button class="quick-action" onclick="sendQuickAction('列出所有产品编号和数量')">🔍 列出产品明细</button>
        </div>
      </div>
    </div>

    <div class="agent-input-bar">
      <div class="input-row">
        <textarea id="chatInput" placeholder="输入你的问题，例如：提取发票号码和总金额..." rows="1"
                  onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div class="quick-actions">
        <button class="quick-action" onclick="sendQuickAction('提取发票号码')">发票号码</button>
        <button class="quick-action" onclick="sendQuickAction('提取发货单位和收货单位')">收发单位</button>
        <button class="quick-action" onclick="sendQuickAction('提取总数量和总金额')">数量金额</button>
        <button class="quick-action" onclick="sendQuickAction('提取所有产品编号')">产品编号</button>
        <button class="quick-action" onclick="sendQuickAction('提取毛重和净重')">毛重净重</button>
      </div>
    </div>
  </div>
</div>

<script src="/js/agent.js"></script>
</body>
</html>
